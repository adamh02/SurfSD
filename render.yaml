services:
  - type: web
    name: surfsd
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.16.0
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_PATH
        value: /var/data/surfsd.sqlite
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: surfsd-data
      mountPath: /var/data
      sizeGB: 1
